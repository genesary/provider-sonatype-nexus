name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

env:
  GO_VERSION: '1.24'
  KIND_CLUSTER_NAME: nexus-e2e
  E2E_REGISTRY: localhost:5001

jobs:
  detect-noop:
    runs-on: ubuntu-latest
    outputs:
      noop: ${{ steps.noop.outputs.should_skip }}
    steps:
      - name: Detect No-op Changes
        id: noop
        uses: fkirc/skip-duplicate-actions@v5
        with:
          github_token: ${{ github.token }}
          paths_ignore: '["**.md", "**.png", "**.jpg", "**.svg", "docs/**"]'
          do_not_skip: '["workflow_dispatch", "schedule", "push"]'

  e2e:
    runs-on: ubuntu-latest
    needs: detect-noop
    if: needs.detect-noop.outputs.noop != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Provider Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            provider-sonatype-nexus:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Crossplane CLI
        run: |
          curl -sL "https://raw.githubusercontent.com/crossplane/crossplane/master/install.sh" | sh
          sudo mv crossplane /usr/local/bin/

      - name: Build Crossplane Package
        run: |
          crossplane xpkg build \
            --package-root=package \
            --embed-runtime-image=provider-sonatype-nexus:local \
            --package-file=provider-sonatype-nexus.xpkg

      - name: Start Local Registry
        run: |
          docker run -d --restart=always -p 5001:5000 --network bridge --name kind-registry registry:2

      - name: Setup Kind
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          config: e2e/kind-config.yaml
          wait: 120s

      - name: Connect Registry to Kind Network
        run: docker network connect kind kind-registry 2>/dev/null || true

      - name: Install Crossplane
        run: |
          helm repo add crossplane-stable https://charts.crossplane.io/stable
          helm repo update
          helm install crossplane crossplane-stable/crossplane \
            --namespace crossplane-system --create-namespace --wait --timeout 120s

      - name: Push xpkg to Local Registry
        run: |
          crossplane xpkg push ${{ env.E2E_REGISTRY }}/provider-sonatype-nexus:e2e \
            -f provider-sonatype-nexus.xpkg

      - name: Deploy Nexus
        run: |
          kubectl apply -f e2e/manifests/nexus.yaml
          echo "Waiting for Nexus..."
          kubectl wait --for=condition=available deployment/nexus -n nexus --timeout=300s || true

      - name: Install Provider via Crossplane
        run: kubectl apply -f e2e/manifests/provider.yaml

      - name: Wait for Provider to be healthy
        run: |
          kubectl wait --for=condition=Healthy providers.pkg.crossplane.io/provider-sonatype-nexus --timeout=180s

      - name: Apply ProviderConfig
        run: kubectl apply -f e2e/manifests/provider-config.yaml

      - name: Wait for Components
        run: |
          chmod +x e2e/tests/*.sh e2e/run-e2e.sh || true
          NEXUS_URL=http://localhost:8081 ./e2e/tests/00-wait-ready.sh
        timeout-minutes: 5

      - name: Run E2E Tests
        run: |
          chmod +x e2e/run-e2e.sh
          NEXUS_URL=http://localhost:8081 ./e2e/run-e2e.sh run
        timeout-minutes: 10

      - name: Get Cluster Status on Failure
        if: failure()
        run: |
          echo "=== Provider Status ==="
          kubectl get providers.pkg.crossplane.io -o wide 2>/dev/null || true
          kubectl get providers.pkg.crossplane.io provider-sonatype-nexus -o yaml 2>/dev/null || true
          echo "=== Pods ==="
          kubectl get pods -A
          echo "=== Provider Logs ==="
          kubectl logs -n crossplane-system -l pkg.crossplane.io/revision --tail=100 2>/dev/null || echo "Provider logs not available"
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -50 || true

      - name: Cleanup
        if: always()
        run: |
          kind delete cluster --name ${{ env.KIND_CLUSTER_NAME }} || true
          docker rm -f kind-registry 2>/dev/null || true
