name: E2E Tests

on:
  push:
    branches:
      - main
      - release-*
  pull_request: {}
  workflow_dispatch: {}

env:
  GO_VERSION: "1.26.3"
  DOCKER_BUILDX_VERSION: "v0.23.0"

jobs:
  detect-noop:
    runs-on: ubuntu-24.04
    outputs:
      noop: ${{ steps.noop.outputs.should_skip }}
    steps:
      - name: Detect No-op Changes
        id: noop
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf # v5.3.1
        with:
          github_token: ${{ github.token }}
          paths_ignore: '["**.md", "**.png", "**.jpg", "**.svg"]'
          do_not_skip: '["workflow_dispatch", "schedule", "push"]'

  e2e:
    runs-on: ubuntu-24.04
    needs: detect-noop
    if: needs.detect-noop.outputs.noop != 'true'
    timeout-minutes: 45

    env:
      # Skip the integration script's own kind teardown trap so the
      # collect-diagnostics step can read logs out of the cluster on failure.
      # The runner is ephemeral, so leaving the cluster running is harmless;
      # the explicit teardown step below handles cleanup.
      skipcleanup: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Fetch History
        run: git fetch --prune --unshallow

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          version: ${{ env.DOCKER_BUILDX_VERSION }}

      - name: Find the Go Build Cache
        id: go
        run: echo "cachedir=$(make go.cachedir)" >> $GITHUB_ENV

      - name: Cache the Go Build Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.cachedir }}
          key: ${{ runner.os }}-build-e2e-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-build-e2e-

      - name: Cache Go Dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .work/pkg
          key: ${{ runner.os }}-pkg-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-pkg-

      - name: Download Go Modules
        run: make modules.download modules.check

      - name: Build provider artifacts
        run: make build
        env:
          BUILD_ARGS: "--load"

      - name: Run e2e suite
        run: make e2e.run

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          set +e
          mkdir -p _output/e2e-logs
          for cluster in $(kind get clusters 2>/dev/null); do
            ctx="kind-$cluster"
            echo "--- $cluster ---"
            kubectl --context "$ctx" get all -A \
              > "_output/e2e-logs/${cluster}-get-all.txt" 2>&1
            kubectl --context "$ctx" describe pods -A \
              > "_output/e2e-logs/${cluster}-describe-pods.txt" 2>&1
            kubectl --context "$ctx" describe managed \
              > "_output/e2e-logs/${cluster}-describe-managed.txt" 2>&1
            kubectl --context "$ctx" logs -n nexus deployment/nexus --tail=-1 \
              > "_output/e2e-logs/${cluster}-nexus.log" 2>&1 || true
            kubectl --context "$ctx" logs -n crossplane-system \
              -l pkg.crossplane.io/revision --tail=-1 \
              > "_output/e2e-logs/${cluster}-provider.log" 2>&1 || true
            kubectl --context "$ctx" logs -n crossplane-system \
              deployment/crossplane --tail=-1 \
              > "_output/e2e-logs/${cluster}-crossplane.log" 2>&1 || true
          done
          ls -la _output/e2e-logs/

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-logs
          path: _output/e2e-logs/
          if-no-files-found: ignore

      - name: Tear down kind clusters
        if: always()
        run: |
          for cluster in $(kind get clusters 2>/dev/null); do
            kind delete cluster --name "$cluster" || true
          done
