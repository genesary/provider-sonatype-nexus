name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

env:
  GO_VERSION: "1.26.3"
  CROSSPLANE_VERSION: "1.19.0"
  KIND_CLUSTER_NAME: nexus-e2e

jobs:
  detect-noop:
    runs-on: ubuntu-24.04
    outputs:
      noop: ${{ steps.noop.outputs.should_skip }}
    steps:
      - name: Detect No-op Changes
        id: noop
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf # v5.3.1
        with:
          github_token: ${{ github.token }}
          paths_ignore: '["**.md", "**.png", "**.jpg", "**.svg", "docs/**"]'
          do_not_skip: '["workflow_dispatch", "schedule", "push"]'

  e2e:
    runs-on: ubuntu-24.04
    needs: detect-noop
    if: needs.detect-noop.outputs.noop != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Fetch History
        run: git fetch --prune --unshallow

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Find the Go Build Cache
        id: go
        run: echo "cachedir=$(make go.cachedir)" >> $GITHUB_ENV

      - name: Cache the Go Build Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.cachedir }}
          key: ${{ runner.os }}-build-e2e-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-build-e2e-

      - name: Cache Go Dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .work/pkg
          key: ${{ runner.os }}-pkg-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-pkg-

      - name: Download Go Modules
        run: make modules.download modules.check

      - name: Build Provider
        run: make build
        env:
          BUILD_ARGS: "--load"

      - name: Setup Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          config: e2e/kind-config.yaml
          node_image: kindest/node:v1.31.4@sha256:2cb39f7295fe7eafee0842b1052a599a4fb0f8bcf3f83d96c7f4864c357c6c30
          wait: 300s

      - name: Install Crossplane
        run: |
          helm repo add crossplane-stable https://charts.crossplane.io/stable
          helm repo update
          helm install crossplane crossplane-stable/crossplane \
            --namespace crossplane-system --create-namespace --wait --timeout 120s \
            --version ${{ env.CROSSPLANE_VERSION }}

      - name: Deploy Provider via local xpkg
        run: |
          make local.xpkg.deploy.provider.provider-sonatype-nexus KIND_CLUSTER_NAME=${{ env.KIND_CLUSTER_NAME }}

      - name: Wait for Provider to be healthy
        run: |
          kubectl wait --for=condition=Healthy providers.pkg.crossplane.io/provider-sonatype-nexus --timeout=180s

      - name: Deploy Nexus
        run: |
          kubectl apply -f e2e/manifests/nexus.yaml
          echo "Waiting for Nexus..."
          kubectl wait --for=condition=available deployment/nexus -n nexus --timeout=300s || true

      - name: Apply ProviderConfig
        run: kubectl apply -f e2e/manifests/provider-config.yaml

      - name: Wait for Components
        run: |
          chmod +x e2e/tests/*.sh e2e/run-e2e.sh || true
          NEXUS_URL=http://localhost:8081 ./e2e/tests/00-wait-ready.sh
        timeout-minutes: 5

      - name: Run E2E Tests
        run: |
          chmod +x e2e/run-e2e.sh
          NEXUS_URL=http://localhost:8081 ./e2e/run-e2e.sh run
        timeout-minutes: 10

      - name: Get Cluster Status on Failure
        if: failure()
        run: |
          echo "=== Provider Status ==="
          kubectl get providers.pkg.crossplane.io -o wide 2>/dev/null || true
          kubectl get providers.pkg.crossplane.io provider-sonatype-nexus -o yaml 2>/dev/null || true
          echo "=== Pods ==="
          kubectl get pods -A
          echo "=== Provider Logs ==="
          kubectl logs -n crossplane-system -l pkg.crossplane.io/revision --tail=100 2>/dev/null || echo "Provider logs not available"
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -50 || true

      - name: Cleanup
        if: always()
        run: |
          kind delete cluster --name ${{ env.KIND_CLUSTER_NAME }} || true
