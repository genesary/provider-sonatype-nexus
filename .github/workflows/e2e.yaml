name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

env:
  GO_VERSION: '1.24'
  KIND_CLUSTER_NAME: nexus-e2e

jobs:
  detect-noop:
    runs-on: ubuntu-latest
    outputs:
      noop: ${{ steps.noop.outputs.should_skip }}
    steps:
      - name: Detect No-op Changes
        id: noop
        uses: fkirc/skip-duplicate-actions@v5
        with:
          github_token: ${{ github.token }}
          paths_ignore: '["**.md", "**.png", "**.jpg", "**.svg", "docs/**"]'
          do_not_skip: '["workflow_dispatch", "schedule", "push"]'

  e2e:
    runs-on: ubuntu-latest
    needs: detect-noop
    if: needs.detect-noop.outputs.noop != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Provider Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            provider-sonatype-nexus:e2e
            docker.io/crossplane/provider-sonatype-nexus:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Kind
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          config: e2e/kind-config.yaml
          wait: 120s

      - name: Load Image into Kind
        run: |
          kind load docker-image provider-sonatype-nexus:e2e --name ${{ env.KIND_CLUSTER_NAME }}
          kind load docker-image docker.io/crossplane/provider-sonatype-nexus:latest --name ${{ env.KIND_CLUSTER_NAME }}

      - name: Install CRDs
        run: kubectl apply -f package/crds/

      - name: Deploy Nexus
        run: |
          kubectl apply -f e2e/manifests/nexus.yaml
          echo "Waiting for Nexus namespace..."
          kubectl wait --for=condition=available deployment/nexus -n nexus --timeout=300s || true

      - name: Deploy Provider
        run: kubectl apply -f e2e/manifests/provider.yaml

      - name: Wait for Components
        run: |
          chmod +x e2e/tests/*.sh e2e/run-e2e.sh || true
          echo "Waiting for provider to be ready..."
          sleep 30
          kubectl get pods -A
        timeout-minutes: 5

      - name: Run E2E Tests
        run: |
          if [ -f "e2e/run-e2e.sh" ]; then
            chmod +x e2e/run-e2e.sh
            NEXUS_URL=http://localhost:8081 ./e2e/run-e2e.sh run || true
          else
            echo "E2E test script not found, skipping..."
          fi
        timeout-minutes: 10

      - name: Get Cluster Status on Failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -A
          echo "=== Provider Logs ==="
          kubectl logs -n crossplane-system deployment/provider-sonatype-nexus --tail=100 2>/dev/null || echo "Provider logs not available"
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -50 || true

      - name: Cleanup
        if: always()
        run: kind delete cluster --name ${{ env.KIND_CLUSTER_NAME }} || true
