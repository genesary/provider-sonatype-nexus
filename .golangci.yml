run:
  timeout: 10m

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - gosimple
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - typecheck
    - unused

linters-settings:
  goimports:
    local-prefixes: github.com/AYDEV-FR/provider-sonatype-nexus
  errcheck:
    exclude-functions:
      - encoding/json.Marshal
      - encoding/json.MarshalIndent

issues:
  exclude-files:
    - "zz_generated.*\\.go$"
  exclude-dirs:
    - vendor
