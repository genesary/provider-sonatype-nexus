---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: repositories.nexus.crossplane.io
spec:
  group: nexus.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - nexus
    kind: Repository
    listKind: RepositoryList
    plural: repositories
    singular: repository
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: EXTERNAL-NAME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Repository is the Schema for the repositories API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RepositorySpec defines the desired state of Repository.
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy specifies what will happen to the underlying external
                  when this managed resource is deleted - either "Delete" or "Orphan" the
                  external resource.
                  This field is planned to be deprecated in favor of the ManagementPolicies
                  field in a future release. Currently, both could be set independently and
                  non-default values would be honored if the feature flag is enabled.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                enum:
                - Orphan
                - Delete
                type: string
              forProvider:
                description: RepositoryParameters defines the desired state of a Repository.
                properties:
                  apt:
                    description: Apt specific configuration.
                    properties:
                      distribution:
                        description: Distribution for APT repository.
                        type: string
                      flat:
                        description: Flat determines if the repository uses flat format.
                        type: boolean
                    type: object
                  aptSigning:
                    description: AptSigning configuration for APT hosted repositories.
                    properties:
                      keypair:
                        description: Keypair is the PGP signing key pair (armored
                          private key).
                        type: string
                      passphrase:
                        description: Passphrase to access PGP signing key.
                        type: string
                    required:
                    - keypair
                    type: object
                  bower:
                    description: Bower specific configuration.
                    properties:
                      rewritePackageUrls:
                        description: RewritePackageUrls forces Bower to retrieve packages
                          through this proxy.
                        type: boolean
                    type: object
                  cargo:
                    description: Cargo specific configuration.
                    properties:
                      requireAuthentication:
                        description: RequireAuthentication indicates if this repository
                          requires authentication.
                        type: boolean
                    type: object
                  cleanup:
                    description: Cleanup configuration.
                    properties:
                      policyNames:
                        description: PolicyNames is a list of cleanup policy names.
                        items:
                          type: string
                        type: array
                    type: object
                  docker:
                    description: Docker specific configuration.
                    properties:
                      forceBasicAuth:
                        description: ForceBasicAuth forces basic authentication.
                        type: boolean
                      httpPort:
                        description: HTTPPort for Docker registry.
                        format: int32
                        type: integer
                      httpsPort:
                        description: HTTPSPort for Docker registry.
                        format: int32
                        type: integer
                      subdomain:
                        description: Subdomain for Docker registry.
                        type: string
                      v1Enabled:
                        description: V1Enabled allows clients to use V1 Docker registry
                          API.
                        type: boolean
                    type: object
                  dockerProxy:
                    description: DockerProxy specific configuration for Docker proxy
                      repositories.
                    properties:
                      cacheForeignLayers:
                        description: CacheForeignLayers allows downloading and caching
                          foreign layers.
                        type: boolean
                      foreignLayerUrlWhitelist:
                        description: ForeignLayerUrlWhitelist is a list of regex patterns
                          for allowed foreign layer URLs.
                        items:
                          type: string
                        type: array
                      indexType:
                        description: IndexType is the type of Docker index (HUB, REGISTRY,
                          CUSTOM).
                        enum:
                        - HUB
                        - REGISTRY
                        - CUSTOM
                        type: string
                      indexUrl:
                        description: IndexURL is the URL of the Docker index to use
                          (for CUSTOM type).
                        type: string
                    type: object
                  format:
                    description: Format of the repository (maven2, npm, docker, raw,
                      etc.).
                    enum:
                    - maven2
                    - npm
                    - docker
                    - raw
                    - nuget
                    - pypi
                    - rubygems
                    - yum
                    - apt
                    - helm
                    - go
                    - r
                    - conan
                    - conda
                    - cocoapods
                    - bower
                    - gitlfs
                    - p2
                    - cargo
                    type: string
                  group:
                    description: Group configuration for group repositories.
                    properties:
                      memberNames:
                        description: MemberNames is a list of member repository names.
                        items:
                          type: string
                        type: array
                      writableMember:
                        description: WritableMember is the writable member of the
                          group (for Docker and Maven).
                        type: string
                    type: object
                  httpClient:
                    description: HTTPClient configuration for proxy repositories.
                    properties:
                      authentication:
                        description: Authentication configuration.
                        properties:
                          ntlmDomain:
                            description: NTLMDomain is the NTLM domain.
                            type: string
                          ntlmHost:
                            description: NTLMHost is the NTLM host.
                            type: string
                          passwordSecretRef:
                            description: PasswordSecretRef is a reference to a secret
                              containing the password.
                            properties:
                              key:
                                description: The key to select.
                                type: string
                              name:
                                description: Name of the secret.
                                type: string
                              namespace:
                                description: Namespace of the secret.
                                type: string
                            required:
                            - key
                            - name
                            - namespace
                            type: object
                          type:
                            description: Type of authentication.
                            enum:
                            - username
                            - ntlm
                            type: string
                          username:
                            description: Username for authentication.
                            type: string
                        type: object
                      autoBlock:
                        default: true
                        description: AutoBlock determines if the repository is auto-blocked.
                        type: boolean
                      blocked:
                        description: Blocked determines if the repository is blocked.
                        type: boolean
                      connection:
                        description: Connection configuration.
                        properties:
                          enableCircularRedirects:
                            description: EnableCircularRedirects enables circular
                              redirects.
                            type: boolean
                          enableCookies:
                            description: EnableCookies enables cookies.
                            type: boolean
                          retries:
                            description: Retries is the number of retries.
                            format: int32
                            type: integer
                          timeout:
                            description: Timeout is the connection timeout in seconds.
                            format: int32
                            type: integer
                          useTrustStore:
                            description: UseTrustStore uses the trust store.
                            type: boolean
                          userAgentSuffix:
                            description: UserAgentSuffix is a custom user agent suffix.
                            type: string
                        type: object
                    type: object
                  maven:
                    description: Maven specific configuration.
                    properties:
                      contentDisposition:
                        description: ContentDisposition for Maven repositories.
                        enum:
                        - INLINE
                        - ATTACHMENT
                        type: string
                      layoutPolicy:
                        description: LayoutPolicy for Maven repositories.
                        enum:
                        - STRICT
                        - PERMISSIVE
                        type: string
                      versionPolicy:
                        description: VersionPolicy for Maven repositories.
                        enum:
                        - RELEASE
                        - SNAPSHOT
                        - MIXED
                        type: string
                    type: object
                  name:
                    description: Name of the repository.
                    type: string
                  negativeCache:
                    description: NegativeCache configuration for proxy repositories.
                    properties:
                      enabled:
                        default: true
                        description: Enabled determines if negative caching is enabled.
                        type: boolean
                      timeToLive:
                        default: 1440
                        description: TimeToLive is the time to live for negative cache
                          entries in minutes.
                        format: int32
                        type: integer
                    type: object
                  npm:
                    description: Npm specific configuration.
                    properties:
                      removeNonCataloged:
                        description: RemoveNonCataloged removes non-cataloged versions.
                        type: boolean
                      removeQuarantined:
                        description: RemoveQuarantined removes quarantined components.
                        type: boolean
                    type: object
                  nugetProxy:
                    description: NugetProxy specific configuration for NuGet proxy
                      repositories.
                    properties:
                      nugetVersion:
                        default: V3
                        description: NugetVersion is the NuGet protocol version (V2
                          or V3).
                        enum:
                        - V2
                        - V3
                        type: string
                      queryCacheItemMaxAge:
                        default: 3600
                        description: QueryCacheItemMaxAge is how long to cache query
                          results in seconds.
                        format: int32
                        type: integer
                    type: object
                  online:
                    default: true
                    description: Online determines if the repository is online.
                    type: boolean
                  proxy:
                    description: Proxy configuration for proxy repositories.
                    properties:
                      contentMaxAge:
                        default: 1440
                        description: ContentMaxAge is the maximum age of cached content
                          in minutes.
                        format: int32
                        type: integer
                      metadataMaxAge:
                        default: 1440
                        description: MetadataMaxAge is the maximum age of cached metadata
                          in minutes.
                        format: int32
                        type: integer
                      remoteUrl:
                        description: RemoteURL is the URL of the remote repository.
                        type: string
                    required:
                    - remoteUrl
                    type: object
                  routingRule:
                    description: RoutingRule is the name of the routing rule for proxy
                      repositories.
                    type: string
                  storage:
                    description: Storage configuration.
                    properties:
                      blobStoreName:
                        description: BlobStoreName is the name of the blob store to
                          use.
                        type: string
                      strictContentTypeValidation:
                        default: true
                        description: StrictContentTypeValidation enables strict content
                          type validation.
                        type: boolean
                      writePolicy:
                        description: WritePolicy for hosted repositories.
                        enum:
                        - ALLOW
                        - ALLOW_ONCE
                        - DENY
                        type: string
                    required:
                    - blobStoreName
                    type: object
                  type:
                    description: Type of the repository (hosted, proxy, group).
                    enum:
                    - hosted
                    - proxy
                    - group
                    type: string
                  yum:
                    description: Yum specific configuration.
                    properties:
                      deployPolicy:
                        description: DeployPolicy for Yum repositories.
                        enum:
                        - STRICT
                        - PERMISSIVE
                        type: string
                      repodataDepth:
                        description: RepodataDepth is the repodata depth.
                        format: int32
                        maximum: 5
                        minimum: 0
                        type: integer
                    type: object
                  yumSigning:
                    description: YumSigning configuration for Yum repositories.
                    properties:
                      keypair:
                        description: Keypair is the PGP signing key pair (armored
                          private key).
                        type: string
                      passphrase:
                        description: Passphrase to access PGP signing key.
                        type: string
                    type: object
                required:
                - format
                - name
                - type
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  This field is planned to replace the DeletionPolicy field in a future
                  release. Currently, both could be set independently and non-default
                  values would be honored if the feature flag is enabled. If both are
                  custom, the DeletionPolicy field will be ignored.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  name:
                    description: Name of the referenced object.
                    type: string
                  policy:
                    description: Policies for referencing.
                    properties:
                      resolution:
                        default: Required
                        description: |-
                          Resolution specifies whether resolution of this reference is required.
                          The default is 'Required', which means the reconcile will fail if the
                          reference cannot be resolved. 'Optional' means this reference will be
                          a no-op if it cannot be resolved.
                        enum:
                        - Required
                        - Optional
                        type: string
                      resolve:
                        description: |-
                          Resolve specifies when this reference should be resolved. The default
                          is 'IfNotPresent', which will attempt to resolve the reference only when
                          the corresponding field is not present. Use 'Always' to resolve the
                          reference on every reconcile.
                        enum:
                        - Always
                        - IfNotPresent
                        type: string
                    type: object
                required:
                - name
                type: object
              publishConnectionDetailsTo:
                description: |-
                  PublishConnectionDetailsTo specifies the connection secret config which
                  contains a name, metadata and a reference to secret store config to
                  which any connection details for this managed resource should be written.
                  Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  configRef:
                    default:
                      name: default
                    description: |-
                      SecretStoreConfigRef specifies which secret store config should be used
                      for this ConnectionSecret.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      policy:
                        description: Policies for referencing.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    required:
                    - name
                    type: object
                  metadata:
                    description: Metadata is the metadata for connection secret.
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        description: |-
                          Annotations are the annotations to be added to connection secret.
                          - For Kubernetes secrets, this will be used as "metadata.annotations".
                          - It is up to Secret Store implementation for others store types.
                        type: object
                      labels:
                        additionalProperties:
                          type: string
                        description: |-
                          Labels are the labels/tags to be added to connection secret.
                          - For Kubernetes secrets, this will be used as "metadata.labels".
                          - It is up to Secret Store implementation for others store types.
                        type: object
                      type:
                        description: |-
                          Type is the SecretType for the connection secret.
                          - Only valid for Kubernetes Secret Stores.
                        type: string
                    type: object
                  name:
                    description: Name is the name of the connection secret.
                    type: string
                required:
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                  This field is planned to be replaced in a future release in favor of
                  PublishConnectionDetailsTo. Currently, both could be set independently
                  and connection details would be published to both without affecting
                  each other.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                  namespace:
                    description: Namespace of the secret.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - forProvider
            type: object
          status:
            description: RepositoryStatus defines the observed state of Repository.
            properties:
              atProvider:
                description: RepositoryObservation represents the observed state of
                  a Repository.
                properties:
                  url:
                    description: URL is the URL of the repository.
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
