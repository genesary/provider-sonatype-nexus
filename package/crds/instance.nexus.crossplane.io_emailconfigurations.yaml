            properties:
              atProvider:
                description: |-
                  EmailConfigurationObservation is the observed state of the Nexus email
                  configuration.
                properties:
                  enabled:
                    description: Enabled is the observed enabled state.
                    type: boolean
                  fromAddress:
                    description: FromAddress is the observed sender address.
                    type: string
                  host:
                    description: Host is the observed SMTP hostname.
                    type: string
                  nexusTrustStoreEnabled:
                    description: NexusTrustStoreEnabled is the observed Nexus truststore
                      state.
                    type: boolean
                  port:
                    description: Port is the observed SMTP port.
                    type: integer
                  sslOnConnectEnabled:
                    description: SslOnConnectEnabled is the observed SSL-on-connect
                      state.
                    type: boolean
                  sslServerIdentityCheckEnabled:
                    description: SslServerIdentityCheckEnabled is the observed SSL
                      identity check state.
                    type: boolean
                  startTlsEnabled:
                    description: StartTlsEnabled is the observed STARTTLS enabled
                      state.
                    type: boolean
                  startTlsRequired:
                    description: StartTlsRequired is the observed STARTTLS required
                      state.
                    type: boolean
                  subjectPrefix:
                    description: SubjectPrefix is the observed subject prefix.
                    type: string
                  username:
                    description: Username is the observed SMTP username.
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
