    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: EmailConfiguration is the Schema for the Nexus SMTP email configuration
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EmailConfigurationSpec defines the desired state of EmailConfiguration.
            properties:
              forProvider:
                description: |-
                  EmailConfigurationParameters defines the desired state of the Nexus SMTP
                  email configuration.
                properties:
                  enabled:
                    description: Enabled determines whether outbound email is active.
                    type: boolean
                  fromAddress:
                    description: FromAddress is the email address used as the sender.
                    type: string
                  host:
                    description: Host is the SMTP server hostname or IP address.
                    type: string
