                  port:
                    description: Port is the SMTP server port.
                    type: integer
                  sslOnConnectEnabled:
                    description: SslOnConnectEnabled enables SSL/TLS on connect (SMTPS).
                    type: boolean
                  sslServerIdentityCheckEnabled:
                    description: SslServerIdentityCheckEnabled enables SSL certificate
                      identity checks.
                    type: boolean
                  startTlsEnabled:
                    description: StartTlsEnabled enables STARTTLS support.
                    type: boolean
                  startTlsRequired:
                    description: StartTlsRequired requires STARTTLS for all connections.
                    type: boolean
                  subjectPrefix:
                    description: SubjectPrefix is prepended to all outbound email
