---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: ldaps.nexus.crossplane.io
spec:
  group: nexus.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - nexus
    kind: LDAP
    listKind: LDAPList
    plural: ldaps
    singular: ldap
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .spec.forProvider.host
      name: HOST
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: EXTERNAL-NAME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: LDAP is the Schema for the ldaps API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: LDAPSpec defines the desired state of LDAP.
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy specifies what will happen to the underlying external
                  when this managed resource is deleted - either "Delete" or "Orphan" the
                  external resource.
                  This field is planned to be deprecated in favor of the ManagementPolicies
                  field in a future release. Currently, both could be set independently and
                  non-default values would be honored if the feature flag is enabled.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                enum:
                - Orphan
                - Delete
                type: string
              forProvider:
                description: LDAPParameters defines the desired state of an LDAP server
                  configuration.
                properties:
                  authPasswordSecretRef:
                    description: AuthPasswordSecretRef is a reference to a secret
                      containing the auth password.
                    properties:
                      key:
                        description: The key to select.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
                    required:
                    - key
                    - name
                    - namespace
                    type: object
                  authRealm:
                    description: AuthRealm is the SASL realm for DIGEST-MD5/CRAM-MD5
                      authentication.
                    type: string
                  authScheme:
                    description: AuthScheme is the authentication scheme.
                    enum:
                    - none
                    - simple
                    - DIGEST_MD5
                    - CRAM_MD5
                    type: string
                  authUsername:
                    description: AuthUsername is the username for LDAP authentication
                      (for simple auth).
                    type: string
                  connectionRetryDelaySeconds:
                    default: 300
                    description: ConnectionRetryDelaySeconds is the delay between
                      connection retries.
                    format: int32
                    type: integer
                  connectionTimeoutSeconds:
                    default: 30
                    description: ConnectionTimeoutSeconds is the timeout for LDAP
                      connections.
                    format: int32
                    type: integer
                  groupBaseDn:
                    description: GroupBaseDN is the relative DN where group objects
                      are found.
                    type: string
                  groupIdAttribute:
                    default: cn
                    description: GroupIDAttribute is the attribute defining the Group
                      ID.
                    type: string
                  groupMemberAttribute:
                    default: uniqueMember
                    description: GroupMemberAttribute is the attribute containing
                      group member usernames.
                    type: string
                  groupMemberFormat:
                    default: uid=${username},ou=people,dc=example,dc=com
                    description: GroupMemberFormat is the format of user IDs in the
                      group member attribute.
                    type: string
                  groupObjectClass:
                    default: groupOfUniqueNames
                    description: GroupObjectClass is the LDAP class for group objects.
                    type: string
                  groupSubtree:
                    description: GroupSubtree determines if groups are located in
                      structures below the group base DN.
                    type: boolean
                  groupType:
                    description: GroupType is the type of group mapping (static or
                      dynamic).
                    enum:
                    - static
                    - dynamic
                    type: string
                  host:
                    description: Host is the LDAP server hostname.
                    type: string
                  ldapGroupsAsRoles:
                    description: LDAPGroupsAsRoles determines if LDAP groups should
                      be used as Nexus roles.
                    type: boolean
                  maxIncidentCount:
                    default: 3
                    description: MaxIncidentCount is the maximum number of connection
                      retries.
                    format: int32
                    type: integer
                  name:
                    description: Name of the LDAP server.
                    type: string
                  port:
                    description: Port is the LDAP server port.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  protocol:
                    description: Protocol to use for connecting to the LDAP server.
                    enum:
                    - ldap
                    - ldaps
                    type: string
                  searchBase:
                    description: SearchBase is the LDAP location to be added to the
                      connection URL.
                    type: string
                  useTrustStore:
                    description: UseTrustStore determines if the truststore should
                      be used.
                    type: boolean
                  userBaseDn:
                    description: UserBaseDN is the relative DN where user objects
                      are found.
                    type: string
                  userEmailAddressAttribute:
                    default: mail
                    description: UserEmailAddressAttribute is the attribute for user
                      email addresses.
                    type: string
                  userIdAttribute:
                    default: uid
                    description: UserIDAttribute is the attribute used to identify
                      users.
                    type: string
                  userLdapFilter:
                    description: UserLDAPFilter is an additional filter to limit user
                      results.
                    type: string
                  userMemberOfAttribute:
                    description: UserMemberOfAttribute is the attribute storing group
                      DNs in user objects.
                    type: string
                  userObjectClass:
                    default: inetOrgPerson
                    description: UserObjectClass is the LDAP class for user objects.
                    type: string
                  userPasswordAttribute:
                    description: UserPasswordAttribute is the attribute for user passwords.
                    type: string
                  userRealNameAttribute:
                    default: cn
                    description: UserRealNameAttribute is the attribute for user real
                      names.
                    type: string
                  userSubtree:
                    description: UserSubtree determines if users are located in structures
                      below the user base DN.
                    type: boolean
                required:
                - authScheme
                - host
                - name
                - port
                - protocol
                - searchBase
                - userBaseDn
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  This field is planned to replace the DeletionPolicy field in a future
                  release. Currently, both could be set independently and non-default
                  values would be honored if the feature flag is enabled. If both are
                  custom, the DeletionPolicy field will be ignored.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  name:
                    description: Name of the referenced object.
                    type: string
                  policy:
                    description: Policies for referencing.
                    properties:
                      resolution:
                        default: Required
                        description: |-
                          Resolution specifies whether resolution of this reference is required.
                          The default is 'Required', which means the reconcile will fail if the
                          reference cannot be resolved. 'Optional' means this reference will be
                          a no-op if it cannot be resolved.
                        enum:
                        - Required
                        - Optional
                        type: string
                      resolve:
                        description: |-
                          Resolve specifies when this reference should be resolved. The default
                          is 'IfNotPresent', which will attempt to resolve the reference only when
                          the corresponding field is not present. Use 'Always' to resolve the
                          reference on every reconcile.
                        enum:
                        - Always
                        - IfNotPresent
                        type: string
                    type: object
                required:
                - name
                type: object
              publishConnectionDetailsTo:
                description: |-
                  PublishConnectionDetailsTo specifies the connection secret config which
                  contains a name, metadata and a reference to secret store config to
                  which any connection details for this managed resource should be written.
                  Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  configRef:
                    default:
                      name: default
                    description: |-
                      SecretStoreConfigRef specifies which secret store config should be used
                      for this ConnectionSecret.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      policy:
                        description: Policies for referencing.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    required:
                    - name
                    type: object
                  metadata:
                    description: Metadata is the metadata for connection secret.
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        description: |-
                          Annotations are the annotations to be added to connection secret.
                          - For Kubernetes secrets, this will be used as "metadata.annotations".
                          - It is up to Secret Store implementation for others store types.
                        type: object
                      labels:
                        additionalProperties:
                          type: string
                        description: |-
                          Labels are the labels/tags to be added to connection secret.
                          - For Kubernetes secrets, this will be used as "metadata.labels".
                          - It is up to Secret Store implementation for others store types.
                        type: object
                      type:
                        description: |-
                          Type is the SecretType for the connection secret.
                          - Only valid for Kubernetes Secret Stores.
                        type: string
                    type: object
                  name:
                    description: Name is the name of the connection secret.
                    type: string
                required:
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                  This field is planned to be replaced in a future release in favor of
                  PublishConnectionDetailsTo. Currently, both could be set independently
                  and connection details would be published to both without affecting
                  each other.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                  namespace:
                    description: Namespace of the secret.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - forProvider
            type: object
          status:
            description: LDAPStatus defines the observed state of LDAP.
            properties:
              atProvider:
                description: LDAPObservation represents the observed state of an LDAP
                  server configuration.
                properties:
                  id:
                    description: ID is the internal LDAP server ID.
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
