---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: tasks.instance.nexus.crossplane.io
spec:
  group: instance.nexus.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - nexus
    kind: Task
    listKind: TaskList
    plural: tasks
    singular: task
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: EXTERNAL-NAME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Task manages a Nexus Repository Manager scheduled task.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TaskSpec defines the desired state of Task.
            properties:
              forProvider:
                description: TaskParameters defines the desired state of a Nexus scheduled
                  task.
                properties:
                  alertEmail:
                    description: AlertEmail is the email address for task alert notifications.
                    type: string
                  enabled:
                    description: Enabled controls whether the task is active.
                    type: boolean
                  message:
                    description: Message is an optional description for the task.
                    type: string
                  name:
                    description: Name is the unique task name.
                    minLength: 1
                    type: string
                    x-kubernetes-validations:
                    - message: Name is immutable.
                      rule: self == oldSelf
                  notificationCondition:
                    description: NotificationCondition controls when email alerts
                      are sent.
                    enum:
                    - FAILURE
                    - SUCCESS_FAILURE
                    - SUCCESS
                    type: string
                  schedule:
                    description: |-
                      Schedule defines the task execution schedule.
                      If omitted the task is created with a manual schedule.
                    properties:
                      cronExpression:
                        description: CronExpression is a cron expression used when
                          Type is "cron".
                        type: string
                      recurringDays:
                        description: |-
                          RecurringDays lists the days for weekly (day names e.g. "sunday") or
                          monthly (day numbers e.g. "1") schedules.
                        items:
                          type: string
                        type: array
                      startDate:
                        description: StartDate is the Unix timestamp in milliseconds
                          for the schedule start date.
                        format: int64
                        type: integer
                      timezone:
                        description: Timezone is the timezone offset string (e.g.,
                          "UTC", "+05:00").
                        type: string
                      type:
                        description: Type is the schedule type.
                        enum:
                        - manual
                        - once
                        - hourly
                        - daily
                        - weekly
                        - monthly
                        - cron
                        type: string
                    required:
                    - type
                    type: object
                  taskProperties:
                    additionalProperties:
                      type: string
                    description: TaskProperties are type-specific configuration key/value
                      pairs.
                    type: object
                  typeId:
                    description: TypeID is the Nexus task type identifier (e.g., "repository.cleanup",
                      "db.backup").
                    minLength: 1
                    type: string
                required:
                - enabled
                - name
                - typeId
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  kind: ClusterProviderConfig
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  kind:
                    description: Kind of the referenced object.
                    type: string
                  name:
                    description: Name of the referenced object.
                    type: string
                required:
                - kind
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: TaskStatus defines the observed state of Task.
            properties:
              atProvider:
                description: TaskObservation defines the observed state of a Nexus
                  scheduled task.
                properties:
                  currentState:
                    description: CurrentState is the current execution state reported
                      by Nexus.
                    type: string
                  id:
                    description: ID is the server-assigned task identifier.
                    type: string
                  lastRun:
                    description: LastRun is the most recent run time.
                    type: string
                  nextRun:
                    description: NextRun is the next scheduled run time.
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastHandledReconcileAt:
                description: |-
                  LastHandledReconcileAt holds the value of the most recent
                  reconcile-requested-at annotation token that the controller has
                  processed. Users can compare this to the annotation to determine
                  whether a reconcile request has been handled.
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
