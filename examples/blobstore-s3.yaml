---
# S3-based BlobStore example
apiVersion: nexus.crossplane.io/v1alpha1
kind: BlobStore
metadata:
  name: my-s3-blobstore
spec:
  forProvider:
    name: my-s3-blobstore
    type: S3
    s3Config:
      bucket: my-nexus-bucket
      region: us-east-1
      prefix: nexus-blobs
      expirationDays: 30
    softQuota:
      type: spaceUsedQuota
      limit: 1073741824  # 1GB in bytes
  providerConfigRef:
    name: nexus-provider-config
