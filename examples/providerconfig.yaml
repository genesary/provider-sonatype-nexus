---
# Secret containing Nexus credentials (JSON-encoded)
apiVersion: v1
kind: Secret
metadata:
  name: nexus-credentials
  namespace: crossplane-system
type: Opaque
stringData:
  credentials: |
    {
      "url": "http://nexus.example.com:8081",
      "username": "admin",
      "password": "admin123",
      "insecure": false
    }
---
# Namespace-scoped ProviderConfig
apiVersion: nexus.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: default
  namespace: crossplane-system
spec:
  credentials:
    source: Secret
    secretRef:
      name: nexus-credentials
      namespace: crossplane-system
      key: credentials
---
# Cluster-scoped ProviderConfig
apiVersion: nexus.crossplane.io/v1alpha1
kind: ClusterProviderConfig
metadata:
  name: default
spec:
  credentials:
    source: Secret
    secretRef:
      name: nexus-credentials
      namespace: crossplane-system
      key: credentials
