---
# Secret containing Nexus username
apiVersion: v1
kind: Secret
metadata:
  name: nexus-username
  namespace: crossplane-system
type: Opaque
stringData:
  username: admin
---
# Secret containing Nexus password
apiVersion: v1
kind: Secret
metadata:
  name: nexus-password
  namespace: crossplane-system
type: Opaque
stringData:
  password: admin123
---
# Namespace-scoped ProviderConfig
apiVersion: nexus.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: default
  namespace: crossplane-system
spec:
  url: http://nexus.example.com:8081
  insecureSkipVerify: false
  username:
    source: Secret
    secretRef:
      name: nexus-username
      namespace: crossplane-system
      key: username
  password:
    source: Secret
    secretRef:
      name: nexus-password
      namespace: crossplane-system
      key: password
---
# Cluster-scoped ProviderConfig
apiVersion: nexus.crossplane.io/v1alpha1
kind: ClusterProviderConfig
metadata:
  name: default
spec:
  url: http://nexus.example.com:8081
  insecureSkipVerify: false
  username:
    source: Secret
    secretRef:
      name: nexus-username
      namespace: crossplane-system
      key: username
  password:
    source: Secret
    secretRef:
      name: nexus-password
      namespace: crossplane-system
      key: password
