---
# Nexus Role example
apiVersion: iam.nexus.crossplane.io/v1alpha1
kind: Role
metadata:
  name: developer-role
  namespace: default
spec:
  forProvider:
    id: developer-role
    name: Developer Role
    description: Role for developers with read access to Maven and NPM repositories
    privileges:
      - nx-repository-view-maven2-*-read
      - nx-repository-view-maven2-*-browse
      - nx-repository-view-npm-*-read
      - nx-repository-view-npm-*-browse
    roles: []  # Can include other roles to inherit from
  providerConfigRef:
    kind: ProviderConfig
    name: default
---
# Nexus Admin Role example with nested roles
apiVersion: iam.nexus.crossplane.io/v1alpha1
kind: Role
metadata:
  name: team-admin-role
  namespace: default
spec:
  forProvider:
    id: team-admin-role
    name: Team Admin Role
    description: Administrative role for team with full access to specific repositories
    privileges:
      - nx-repository-admin-maven2-maven-releases-*
      - nx-repository-admin-npm-npm-hosted-*
    roles:
      - developer-role  # Inherits permissions from developer-role
  providerConfigRef:
    kind: ProviderConfig
    name: default
