---
# HuggingFace proxy repository example
apiVersion: repository.nexus.crossplane.io/v1alpha1
kind: Repository
metadata:
  name: huggingface-proxy
  namespace: default
spec:
  forProvider:
    name: huggingface-proxy
    format: huggingface
    type: proxy
    online: true
    proxy:
      remoteUrl: https://huggingface.co
      contentMaxAge: 1440
      metadataMaxAge: 1440
    negativeCache:
      enabled: true
      timeToLive: 1440
    httpClient:
      blocked: false
      autoBlock: true
    storage:
      blobStoreName: default
      strictContentTypeValidation: true
  providerConfigRef:
    kind: ProviderConfig
    name: default
