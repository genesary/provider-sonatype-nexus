---
apiVersion: v1
kind: Secret
metadata:
  name: e2e-license-file
  namespace: default
type: Opaque
data:
  # Base64-encoded placeholder; replace with real Nexus license for live validation.
  license.lic: cGxhY2Vob2xkZXItbGljZW5zZS1kYXRh
---
apiVersion: iam.nexus.crossplane.io/v1alpha1
kind: License
metadata:
  name: e2e-test-license
spec:
  forProvider:
    licenseSecretRef:
      name: e2e-license-file
      namespace: default
      key: license.lic
  providerConfigRef:
    kind: ProviderConfig
    name: default
