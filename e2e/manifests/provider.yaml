---
apiVersion: v1
kind: Namespace
metadata:
  name: crossplane-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-sonatype-nexus
  namespace: crossplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provider-sonatype-nexus
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["nexus.crossplane.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-sonatype-nexus
subjects:
  - kind: ServiceAccount
    name: provider-sonatype-nexus
    namespace: crossplane-system
roleRef:
  kind: ClusterRole
  name: provider-sonatype-nexus
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-sonatype-nexus
  namespace: crossplane-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: provider-sonatype-nexus
  template:
    metadata:
      labels:
        app: provider-sonatype-nexus
    spec:
      serviceAccountName: provider-sonatype-nexus
      containers:
        - name: provider
          image: provider-sonatype-nexus:e2e
          imagePullPolicy: Never
          args:
            - --debug
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Secret
metadata:
  name: nexus-credentials
  namespace: crossplane-system
type: Opaque
stringData:
  credentials: |
    {
      "url": "http://nexus.nexus.svc.cluster.local:8081",
      "username": "admin",
      "password": "admin123",
      "insecure": true
    }
---
apiVersion: nexus.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: default
spec:
  credentials:
    source: Secret
    secretRef:
      name: nexus-credentials
      namespace: crossplane-system
      key: ""
