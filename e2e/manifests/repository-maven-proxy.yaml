apiVersion: nexus.crossplane.io/v1alpha1
kind: Repository
metadata:
  name: e2e-test-maven-proxy
  namespace: default
spec:
  forProvider:
    name: e2e-test-maven-proxy
    format: maven2
    type: proxy
    online: true
    maven:
      versionPolicy: RELEASE
      layoutPolicy: STRICT
    proxy:
      remoteUrl: https://repo1.maven.org/maven2/
      contentMaxAge: 1440
      metadataMaxAge: 1440
    storage:
      blobStoreName: default
      strictContentTypeValidation: true
    httpClient:
      blocked: false
      autoBlock: true
      connection:
        useTrustStore: true
      authentication:
        type: username
        username: proxyuser
        passwordSecretRef:
          name: e2e-proxy-auth
          namespace: default
          key: password
    negativeCache:
      enabled: true
      timeToLive: 1440
  providerConfigRef:
    kind: ProviderConfig
    name: default
